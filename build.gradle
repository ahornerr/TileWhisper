plugins {
	id 'java'
}

repositories {
	mavenLocal()
	maven {
		url = 'https://repo.runelite.net'
		content {
			includeGroupByRegex("net\\.runelite.*")
		}
	}
	mavenCentral()
}

def runeLiteVersion = 'latest.release'
def pluginMainClass = 'com.tilewhisper.TileWhisperPluginTest'

dependencies {
	compileOnly group: 'net.runelite', name:'client', version: runeLiteVersion

	compileOnly 'org.projectlombok:lombok:1.18.38'
	annotationProcessor 'org.projectlombok:lombok:1.18.38'

	compileOnly 'com.google.code.gson:gson:2.10.1'

	implementation 'io.github.jaredmdobson:concentus:1.0.2'

	testImplementation 'junit:junit:4.12'
	testImplementation group: 'net.runelite', name:'client', version: runeLiteVersion
	testImplementation group: 'net.runelite', name:'jshell', version: runeLiteVersion
}

group = 'com.tilewhisper'
version = '1.0-SNAPSHOT'

tasks.withType(JavaCompile).configureEach {
	options.encoding = 'UTF-8'
	options.release.set(11)
	options.compilerArgs.add('-Xlint:deprecation')
}

test {
	failOnNoDiscoveredTests = false
}

tasks.register('run', JavaExec) {
	classpath = sourceSets.test.runtimeClasspath
	mainClass = pluginMainClass

	jvmArgs "-ea"
	if (org.gradle.internal.os.OperatingSystem.current().isMacOsX()) {
		jvmArgs "--add-opens", "java.desktop/com.apple.eawt=ALL-UNNAMED",
			"--add-opens", "java.desktop/com.apple.eawt.event=ALL-UNNAMED",
			"--add-opens", "java.desktop/com.apple.laf=ALL-UNNAMED"
	}
	args "--developer-mode", "--debug"
}

tasks.register('shadowJar', Jar) {
	dependsOn configurations.testRuntimeClasspath
	manifest {
		attributes('Main-Class': pluginMainClass, 'Multi-Release': true)
	}

	duplicatesStrategy = DuplicatesStrategy.EXCLUDE
	from sourceSets.main.output
	from sourceSets.test.output
	from {
		configurations.testRuntimeClasspath.collect { file ->
			file.isDirectory() ? file : zipTree(file)
		}
	}

	exclude 'META-INF/INDEX.LIST'
	exclude 'META-INF/*.SF'
	exclude 'META-INF/*.DSA'
	exclude 'META-INF/*.RSA'
	exclude '**/module-info.class'

	group = BasePlugin.BUILD_GROUP
	archiveClassifier.set('shadow')
	archiveFileName.set("${rootProject.name}-${project.version}-all.jar")
}

// Distribution JAR for external plugin loading (Bolt launcher, etc.)
// Includes Concentus dependency but excludes test/dev code
tasks.register('distJar', Jar) {
	manifest {
		attributes('Multi-Release': true)
	}

	duplicatesStrategy = DuplicatesStrategy.EXCLUDE
	from sourceSets.main.output
	from {
		configurations.runtimeClasspath.collect { file ->
			file.isDirectory() ? file : zipTree(file)
		}
	}

	exclude 'META-INF/INDEX.LIST'
	exclude 'META-INF/*.SF'
	exclude 'META-INF/*.DSA'
	exclude 'META-INF/*.RSA'
	exclude '**/module-info.class'
	exclude '**/TileWhisperPluginTest.class'
	exclude '**/TileWhisperPluginTest$*.class'

	group = BasePlugin.BUILD_GROUP
	archiveClassifier.set('dist')
	archiveFileName.set("${rootProject.name}-${project.version}.jar")

	description = 'Creates a distribution JAR for external plugin loading (includes Concentus, no dev code)'
}
