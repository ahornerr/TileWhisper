name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JARs
        run: ./gradlew shadowJar distJar

      - name: Test
        run: ./gradlew test

      - name: Upload shadow JAR (Bolt launcher)
        uses: actions/upload-artifact@v4
        with:
          name: TileWhisper-shadow-${{ github.sha }}
          path: build/libs/TileWhisper-*-all.jar
          retention-days: 90

      - name: Upload dist JAR (RuneLite plugin)
        uses: actions/upload-artifact@v4
        with:
          name: TileWhisper-dist-${{ github.sha }}
          path: |
            build/libs/TileWhisper-*.jar
            !build/libs/TileWhisper-*-all.jar
          retention-days: 90
