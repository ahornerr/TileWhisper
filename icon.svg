<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background tile -->
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12"
        fill="#4CAF50" filter="url(#shadow)"/>
  <rect x="4" y="4" width="56" height="20" rx="12" ry="12" fill="#66BB6A" opacity="0.35"/>

  <g transform="translate(27, 27)">
    <!-- Arm drawn FIRST so capsule covers the endpoints -->
    <path d="M -6 0 C -13 0, -13 18, 0 18 C 13 18, 13 0, 6 0"
          stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Post -->
    <line x1="0" y1="18" x2="0" y2="24"
          stroke="white" stroke-width="3" stroke-linecap="round"/>

    <!-- Base -->
    <line x1="-7" y1="24" x2="7" y2="24"
          stroke="white" stroke-width="3" stroke-linecap="round"/>

    <!-- Capsule drawn LAST so it covers the arm endpoint seam -->
    <rect x="-6" y="-14" width="12" height="20" rx="6" fill="white"/>
  </g>

  <!-- Sound waves -->
  <g stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M 41 25 Q 47 32 41 39" opacity="0.8"/>
    <path d="M 45 21 Q 54 32 45 43" opacity="0.45"/>
  </g>
</svg>
